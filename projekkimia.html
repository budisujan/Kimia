<input id="input1" />
<button onclick="mainfunction()">Analisis</button>
<span id="output1"></span>
<p id="output2"></p>
<canvas id="canvas1" width="900" height="400"></canvas>

    <script>
        function mainfunction() {
            const hasil = prosesawal(document.getElementById("input1").value);

            const d = prosesawal(document.getElementById("input1").value, true);

            document.getElementById("output1").innerText =
                `\nNama : ${hasil.text} \n Massa Relative : ${d.mr}` || "Error";
            const ctx = document.getElementById("canvas1").getContext("2d");

            ctx.clearRect(0, 0, 900, 450);
            if (hasil.canvas) ctx.drawImage(hasil.canvas, 0, 0);

            document.getElementById("output2").innerText = "\n Ikatan parsial : " + JSON.stringify(hasil.bonds || {});
        }

        function prosesawal(input, skip = false) {
            
            const prosesBesar = (input) => {
// Digunakan untuk mencari apakah senyawa yang dimasukkan adalah senyawa organik alias hidrokarbon atau tidak
//Jika tidak langsung lempar ke prosesan2
                const teks = input.trim();
                const polaStruktur = /C(?![a-z])[H\d]*|(?<=[CH\d])[\(\)=#]/g;
                const matchesStruktur = teks.match(polaStruktur);
                const polaSimbol = /^C\d*H\d+([A-Z][a-z]?)?(\d*)?$/i;
                const polaNama = /ana$|ena$|una$|metil|etil|propil|butil|pent/i;
                let tipeInput = "tidak dikenali";
                if (polaSimbol.test(teks)) tipeInput = "simbol";
                else if (polaNama.test(teks)) {
                    if (input.toLowerCase() === "metana") {
                  const r = prosesan2("CH4");
//metana walaupun senyawa organik, tapi dilempar ke prosesan2 karena jika tidak, nanti visual nya hanya satu bulatan

                        return { text: r.nama, canvas: r.visual, bonds: hitungIkatan(r._atoms || []) };
                    } else {
                        tipeInput = "nama";
                    }
                } else if (matchesStruktur && matchesStruktur.length > 1) tipeInput = "struktur";
                else tipeInput = "simbol";
                if (tipeInput === "simbol") {
                    const regex = /^C(\d*)H(\d*)([A-Z][a-z]?)?(\d*)$/i;
                    const m = teks.match(regex);
                    if (!m || teks.toUpperCase() === "CH4") {
                        const r = prosesan2(input);
                        return { text: r.nama, canvas: r.visual, bonds: r._bonds || {} };
                    }
                    const offCanvas = document.createElement("canvas");
                    offCanvas.width = 800;
                    offCanvas.height = 250;
                    const ctxH = offCanvas.getContext("2d");
                    let n = parseInt(m[1] || 1);
                    let hIn = parseInt(m[2] || 0);
                    let halo = (m[3] || "").toUpperCase();
                    let haloCount = parseInt(m[4] || 1);
                    let pre = ["", "Met", "Et", "Prop", "But", "Pent", "Heks", "Hept", "Okt", "Non", "Dek"]; //Awalan nama senhawa
                    let base = n <= 10 ? pre[n].toLowerCase() : "karbon-" + n;
                    let hasilNama = "",
                        tipeB = 1,
                        isAlkil = false;
                    if (halo === "OH") hasilNama = pre[n] + "anol"; //senyawa alkohol
                    else if (["CL", "F", "BR", "I"].includes(halo)) {
                        const hMap = { CL: "kloro", F: "fluoro", BR: "bromo", I: "iodo" };
//senyawa haloalkana
                        const pfx = haloCount > 1 ? (haloCount === 2 ? "di" : haloCount === 3 ? "tri" : "tetra") : "";
                        hasilNama = pfx + hMap[halo] + base + "ana";
                    } else {
                        if (hIn === 2 * n + 2) {
                            hasilNama = pre[n] + "ana";
                        } else if (hIn === 2 * n + 1) {
                            hasilNama = pre[n] + "il";
                            isAlkil = true;
                        } else if (hIn === 2 * n) {
                            hasilNama = pre[n] + "ena";
                            tipeB = 2;
                        } else if (hIn === 2 * n - 2) {
                            hasilNama = pre[n] + "una";
                            tipeB = 3;
                        } else hasilNama = "Senyawa Karbon";
                    }
                    let startX = 80,
                        yH = 125,
                        gapH = 110,
                        radiusH = 35,
                        bondIdx = Math.floor(n / 2) - 1;
                    for (let i = 0; i < n; i++) {
                        let x = startX + i * gapH;
                        let tKiri = i > 0 ? (i - 1 === bondIdx ? tipeB : 1) : 0;
                        let tKanan = i < n - 1 ? (i === bondIdx ? tipeB : 1) : 0;
                        let tEkstra = i === n - 1 && (halo === "OH" || isAlkil) ? 1 : 0;
                        let hSub = i === n - 1 && halo !== "" && halo !== "OH" ? haloCount : 0;
                        let jmlH = 4 - (tKiri + tKanan + tEkstra + hSub);
                        if (jmlH < 0) jmlH = 0;
                        let txtCH = "C" + (jmlH > 0 ? "H" + (jmlH > 1 ? jmlH : "") : "");
                        if (i === n - 1 && halo !== "" && halo !== "OH")
                            txtCH +=
                                halo.charAt(0) +
                                (halo.length > 1 ? halo.charAt(1).toLowerCase() : "") +
                                (haloCount > 1 ? haloCount : "");
                        ctxH.lineWidth = 2;
                        ctxH.strokeStyle = "#333";
                        if (i < n - 1) {
                            let bt = i === bondIdx ? tipeB : 1;
                            if (bt === 1) {
                                ctxH.beginPath();
                                ctxH.moveTo(x + radiusH, yH);
                                ctxH.lineTo(x + gapH - radiusH, yH);
                                ctxH.stroke();
                            } else if (bt === 2) {
                                ctxH.beginPath();
                                ctxH.moveTo(x + radiusH, yH - 4);
                                ctxH.lineTo(x + gapH - radiusH, yH - 4);
                                ctxH.stroke();
                                ctxH.beginPath();
                                ctxH.moveTo(x + radiusH, yH + 4);
                                ctxH.lineTo(x + gapH - radiusH, yH + 4);
                                ctxH.stroke();
                            } else if (bt === 3) {
                                ctxH.beginPath();
                                ctxH.moveTo(x + radiusH, yH - 7);
                                ctxH.lineTo(x + gapH - radiusH, yH - 7);
                                ctxH.stroke();
                                ctxH.beginPath();
                                ctxH.moveTo(x + radiusH, yH);
                                ctxH.lineTo(x + gapH - radiusH, yH);
                                ctxH.stroke();
                                ctxH.beginPath();
                                ctxH.moveTo(x + radiusH, yH + 7);
                                ctxH.lineTo(x + gapH - radiusH, yH + 7);
                                ctxH.stroke();
                            }
                        }
                        if (i === n - 1 && (halo === "OH" || isAlkil)) {
                            ctxH.beginPath();
                            ctxH.moveTo(x + radiusH, yH);
                            ctxH.lineTo(x + radiusH + 40, yH);
                            ctxH.stroke();
                        }
                        ctxH.beginPath();
                        ctxH.arc(x, yH, radiusH, 0, Math.PI * 2);
                        ctxH.fillStyle = "#58a6ff";
                        ctxH.fill();
                        ctxH.stroke();
                        ctxH.fillStyle = "white";
                        ctxH.font = "bold 15px Arial";
                        ctxH.textAlign = "center";
                        ctxH.textBaseline = "middle";
                        ctxH.fillText(txtCH, x, yH);
                    }
                    if (halo === "OH") {
                        let lx = startX + n * gapH;
                        ctxH.beginPath();
                        ctxH.arc(lx - (gapH - 40 - radiusH), yH, radiusH, 0, Math.PI * 2);
                        ctxH.fillStyle = "#aff5b4";
                        ctxH.fill();
                        ctxH.stroke();
                        ctxH.fillStyle = "black";
                        ctxH.fillText("OH", lx - (gapH - 40 - radiusH), yH);
                    }
                    const bonds = hitungIkatan({ n, typeE: tipeB, posF: bondIdx + 1, branches: [], halo, haloCount });
                    if (hIn > 0 && !halo) {
                        delete bonds["C-H"];
                        bonds["C-H"] = hIn;
                    }
                    return { text: hasilNama.charAt(0).toUpperCase() + hasilNama.slice(1), canvas: offCanvas, bonds };
                }
                let nodes = [],
                    longestPath = [];
                let kodeIntern = "";
                if (tipeInput === "nama") {
                    let n = teks.toLowerCase();
                    const awl = { met: 1, et: 2, prop: 3, but: 4, pent: 5, heks: 6, hept: 7, okt: 8, non: 9, dek: 10 };
                    let mMain = n.match(/(met|et|prop|but|pent|heks|hept|okt|non|dek)(ana|ena|una)$/);
                    if (!mMain) return { text: "Format Nama Tidak Valid", bonds: {} };
                    let nUtama = awl[mMain[1]],
                        jenis = mMain[2],
                        sRk = jenis === "ena" ? "=" : jenis === "una" ? "~" : "";
                    let pRkM = n.match(/(\d+)-(?:met|et|prop|but|pent|heks|hept|okt|non|dek)(?:ena|una)/);
                    let pRk = pRkM ? pRkM[1] : "1",
                        brs = [];
                    let bReg = /([\d,]+)-(?:di|tri|tetra)?(metil|etil|propil|butil)/g,
                        mB;
                    while ((mB = bReg.exec(n)) !== null) {
                        let pArr = mB[1].split(","),
                            sz = mB[2] === "metil" ? 1 : mB[2] === "etil" ? 2 : mB[2] === "propil" ? 3 : 4;
                        pArr.forEach((p) => brs.push({ pos: parseInt(p), size: sz }));
                    }
                    brs.sort((a, b) => a.pos - b.pos);
                    kodeIntern =
                        brs.map((b) => `${b.pos}(${b.size})`).join(",") +
                        (brs.length ? "-" : "") +
                        nUtama +
                        (sRk ? sRk + pRk : "");
                } else {
                    try {
                        const _tok = (s) => {
                            const t = [];
                            let i = 0;
                            while (i < s.length) {
                                const c = s[i];
                                if (c === "(") {
                                    t.push({ y: "O" });
                                    i++;
                                } else if (c === ")") {
                                    i++;
                                    let m = 1;
                                    if (i < s.length && /\d/.test(s[i])) {
                                        m = parseInt(s[i]);
                                        i++;
                                    }
                                    t.push({ y: "C", m });
                                } else if (c === "=" || c === "~" || c === "≡" || c === "#") {
                                    t.push({ y: "B", c });
                                    i++;
                                } else if (c === "C" && (i + 1 >= s.length || !/[adeilmnorstuy]/.test(s[i + 1]))) {
                                    let j = i + 1;
                                    if (j < s.length && s[j] === "H") {
                                        j++;
                                        while (j < s.length && /\d/.test(s[j])) j++;
                                    }
                                    t.push({ y: "A" });
                                    i = j;
                                } else i++;
                            }
                            return t;
                        };
                        const _reorder = (t) => {
                            let d = 0,
                                fc = -1;
                            for (let i = 0; i < t.length; i++) {
                                if (t[i].y === "O") d++;
                                else if (t[i].y === "C") d--;
                                else if (t[i].y === "A" && d === 0) {
                                    fc = i;
                                    break;
                                }
                            }
                            if (fc <= 0) return t;
                            let d2 = 0,
                                hasLG = false;
                            for (let i = 0; i < fc; i++) {
                                if (t[i].y === "O" && d2 === 0) {
                                    hasLG = true;
                                    break;
                                }
                                if (t[i].y === "O") d2++;
                                if (t[i].y === "C") d2--;
                            }
                            if (!hasLG) return t;
                            return [t[fc], ...t.slice(0, fc), ...t.slice(fc + 1)];
                        };
                        const _build = (t) => {
                            const ns = [];
                            function an() {
                                const id = ns.length;
                                ns.push({ id, bonds: [], bondOrders: {} });
                                return id;
                            }
                            function lk(a, b, o = 1) {
                                if (a == null || b == null || a === b) return;
                                if (!ns[a].bonds.includes(b)) ns[a].bonds.push(b);
                                if (!ns[b].bonds.includes(a)) ns[b].bonds.push(a);
                                ns[a].bondOrders[b] = o;
                                ns[b].bondOrders[a] = o;
                            }
                            function ps(toks, prev, bo) {
                                let lp = prev,
                                    nb = bo || 1,
                                    i = 0;
                                while (i < toks.length) {
                                    const k = toks[i];
                                    if (k.y === "A") {
                                        const id = an();
                                        lk(lp, id, nb);
                                        nb = 1;
                                        lp = id;
                                        i++;
                                    } else if (k.y === "B") {
                                        nb = k.c === "=" ? 2 : 3;
                                        i++;
                                    } else if (k.y === "O") {
                                        let d = 1,
                                            j = i + 1;
                                        while (j < toks.length && d > 0) {
                                            if (toks[j].y === "O") d++;
                                            else if (toks[j].y === "C") d--;
                                            j++;
                                        }
                                        const ci = j - 1,
                                            m = toks[ci].m,
                                            inn = toks.slice(i + 1, ci);
                                        for (let k2 = 0; k2 < m; k2++) ps(inn, lp, 1);
                                        i = ci + 1;
                                    } else i++;
                                }
                                return lp;
                            }
                            ps(_reorder(t), null, 1);
                            return ns;
                        };
                        const nodes = _build(_tok(teks));
                        const findL = (c, v) => {
                            v.add(c);
                            let p = [c];
                            for (const n of nodes[c].bonds) {
                                if (!v.has(n)) {
                                    const sp = findL(n, new Set(v));
                                    if (sp.length + 1 > p.length) p = [c, ...sp];
                                }
                            }
                            return p;
                        };
                        nodes.forEach((_, i) => {
                            if (nodes[i].bonds.length === 1) {
                                const p = findL(i, new Set());
                                if (p.length > longestPath.length) longestPath = p;
                            }
                        });
                        if (!longestPath.length)
                            nodes.forEach((_, i) => {
                                const p = findL(i, new Set());
                                if (p.length > longestPath.length) longestPath = p;
                            });
                        kodeIntern = "__graph__";
                        const canvas2 = document.createElement("canvas");
                        canvas2.width = 1000;
                        canvas2.height = 800;
                        const ctx2 = canvas2.getContext("2d");
                        const analyze2 = (path) => {
                            let brs = [],
                                dbP = Infinity;
                            for (let i = 0; i < path.length - 1; i++) {
                                if (nodes[path[i]].bondOrders[path[i + 1]] > 1) dbP = Math.min(dbP, i + 1);
                                nodes[path[i]].bonds.forEach((nbr) => {
                                    if (!path.includes(nbr)) {
                                        let sz = 0,
                                            st = [nbr],
                                            vS = new Set(path);
                                        while (st.length) {
                                            const c = st.pop();
                                            vS.add(c);
                                            sz++;
                                            nodes[c].bonds.forEach((bn) => {
                                                if (!vS.has(bn)) st.push(bn);
                                            });
                                        }
                                        brs.push({ pos: i + 1, len: sz });
                                    }
                                });
                            }
                            return { dbPos: dbP, brs: brs.sort((a, b) => a.pos - b.pos) };
                        };
                        const f2 = analyze2(longestPath),
                            b2 = analyze2([...longestPath].reverse());
                        let finalD2, finalP2;
                        if (f2.dbPos !== b2.dbPos) {
                            finalD2 = f2.dbPos < b2.dbPos ? f2 : b2;
                            finalP2 = f2.dbPos < b2.dbPos ? longestPath : [...longestPath].reverse();
                        } else {
                            const fS = JSON.stringify(f2.brs.map((x) => x.pos)),
                                bS = JSON.stringify(b2.brs.map((x) => x.pos));
                            finalD2 = fS <= bS ? f2 : b2;
                            finalP2 = fS <= bS ? longestPath : [...longestPath].reverse();
                        }
                        const preI2 = ["", "met", "et", "prop", "but", "pent", "heks", "hept", "okt", "non", "dek"]; //awalan nama senyawa hidrokarbon dengan imbuhan di, tri, di awal untuk membedah rumus struktur
                        const gr2 = {};
                        finalD2.brs.forEach((d) => {
                            const n = (d.len <= 10 ? preI2[d.len] : "C" + d.len) + "il";
                            gr2[n] = gr2[n] || [];
                            gr2[n].push(d.pos);
                        });
                        const typeE2 =
                            finalD2.dbPos < Infinity
                                ? nodes[finalP2[finalD2.dbPos - 1]]?.bondOrders[finalP2[finalD2.dbPos]] || 1
                                : 1;
                        const bStr2 = Object.keys(gr2)
                            .sort()
                            .map((n) => {
                                const pL = gr2[n].sort((x, y) => x - y),
                                    pfx = ["", "", "di", "tri", "tetra", "penta"][pL.length] || ""; //awalan di tri
                                return pL.join(",") + "-" + pfx + n;
                            })
                            .join("-");
                        const suffix = ["ana", "ena", "una"][typeE2 - 1];
                        const dbPStr = typeE2 > 1 && finalD2.dbPos < Infinity ? finalD2.dbPos + "-" : "";
                        let resNama2 = (bStr2 ? bStr2 + "-" : "") + dbPStr + preI2[longestPath.length] + suffix;
                        resNama2 = resNama2.charAt(0).toUpperCase() + resNama2.slice(1);
                        const pos2 = {};
                        finalP2.forEach((nid, i) => {
                            pos2[nid] = { x: i, y: 0 };
                        });
                        const bTrk = {};
                        finalP2.forEach((nid, pi) => {
                            nodes[nid].bonds.forEach((nbr) => {
                                if (finalP2.includes(nbr)) return;
                                bTrk[nid] = (bTrk[nid] || 0) + 1;
                                const bc = bTrk[nid],
                                    dy = bc === 1 ? 1 : bc === 2 ? -1 : 0,
                                    dx = bc === 3 ? (pi === 0 ? -1 : 1) : 0;
                                const bq = [nbr];
                                const bv = new Set([...finalP2, nbr]);
                                pos2[nbr] = { x: pos2[nid].x + (dx === 0 ? 0 : dx), y: pos2[nid].y + dy };
                                while (bq.length) {
                                    const cur = bq.shift();
                                    nodes[cur].bonds.forEach((bn) => {
                                        if (!bv.has(bn)) {
                                            bv.add(bn);
                                            pos2[bn] = {
                                                x: pos2[cur].x + (dy !== 0 ? 1 : dx),
                                                y: pos2[cur].y + (dy !== 0 ? dy : 0),
                                            };
                                            bq.push(bn);
                                        }
                                    });
                                }
                            });
                        });
                        const gap2 = 85,
                            r2 = 26,
                            oX2 = 120,
                            oY2 = 220;
                        nodes.forEach((n) => {
                            const p = pos2[n.id] || { x: n.id, y: 0 },
                                x = oX2 + p.x * gap2,
                                y = oY2 + p.y * gap2;
                            n.bonds.forEach((tid) => {
                                if (tid < n.id) return;
                                const tp = pos2[tid] || { x: tid, y: 0 },
                                    tx = oX2 + tp.x * gap2,
                                    ty = oY2 + tp.y * gap2,
                                    ord = n.bondOrders[tid] || 1;
                                ctx2.beginPath();
                                ctx2.strokeStyle = "#2c3e50";
                                ctx2.lineWidth = 2;
                                if (ord === 1) {
                                    ctx2.moveTo(x, y);
                                    ctx2.lineTo(tx, ty);
                                } else if (ord === 2) {
                                    ctx2.moveTo(x, y - 4);
                                    ctx2.lineTo(tx, ty - 4);
                                    ctx2.moveTo(x, y + 4);
                                    ctx2.lineTo(tx, ty + 4);
                                } else {
                                    ctx2.moveTo(x, y - 7);
                                    ctx2.lineTo(tx, ty - 7);
                                    ctx2.moveTo(x, y);
                                    ctx2.lineTo(tx, ty);
                                    ctx2.moveTo(x, y + 7);
                                    ctx2.lineTo(tx, ty + 7);
                                }
                                ctx2.stroke();
                            });
                            ctx2.beginPath();
                            ctx2.arc(x, y, r2, 0, Math.PI * 2);
                            ctx2.fillStyle = finalP2.includes(n.id) ? "#27ae60" : "#f1c40f";
                            ctx2.fill();
                            ctx2.stroke();
                            const usd = Object.values(n.bondOrders).reduce((a, b) => a + b, 0);
                            ctx2.fillStyle = "white";
                            ctx2.textAlign = "center";
                            ctx2.font = "bold 14px Arial";
                            ctx2.fillText("C" + (4 - usd > 0 ? "H" + (4 - usd > 1 ? 4 - usd : "") : ""), x, y + 5);
                        });
                        const bonds2 = hitungIkatan(nodes);
                        return { text: resNama2, canvas: canvas2, bonds: bonds2 };
                    } catch (e) {
                        return { text: "Error Struktur: " + e, bonds: {} };
                    }
                }
                const canvas = document.createElement("canvas");
                canvas.width = 1000;
                canvas.height = 800;
                const ctx = canvas.getContext("2d");
                try {
                    let parts = kodeIntern.split("-"),
                        cPart = parts.length > 1 ? parts[0] : "",
                        uPart = parts.length > 1 ? parts[1] : parts[0];
                    let nBrs = [];
                    if (cPart) {
                        cPart.split(/,(?![^\(]*\))/).forEach((g) => {
                            if (g.includes("(")) {
                                let [pRaw, len] = g.split("(");
                                len = len.replace(")", "");
                                pRaw.split(",").forEach((p, idx, a) =>
                                    nBrs.push(`${p}(${idx === a.length - 1 ? len : 1})`)
                                );
                            } else g.split(",").forEach((p) => nBrs.push(`${p}(1)`));
                        });
                    }
                    let nUtama = parseInt(uPart.split(/[=~|]/)[0]),
                        typeE = 1,
                        posF = 0;
                    if (uPart.includes("=") || uPart.includes("~")) {
                        typeE = uPart.includes("=") ? 2 : 3;
                        posF = parseInt(uPart.split(/[=~]/)[1] || 0);
                    }
                    for (let i = 0; i < nUtama; i++) {
                        nodes.push({ id: i, bonds: [], x: i, y: 0, bondOrders: {} });
                        if (i > 0) {
                            let order = i === posF ? typeE : 1;
                            nodes[i].bonds.push(i - 1);
                            nodes[i - 1].bonds.push(i);
                            nodes[i].bondOrders[i - 1] = order;
                            nodes[i - 1].bondOrders[i] = order;
                        }
                    }
                    let bTrack = {};
                    nBrs.forEach((br) => {
                        let b = br.match(/(\d+)\((\d+)\)/),
                            pIdx = parseInt(b[1]) - 1,
                            len = parseInt(b[2]);
                        bTrack[pIdx] = (bTrack[pIdx] || 0) + 1;
                        let c = bTrack[pIdx],
                            dx = 0,
                            dy = c === 1 ? 1 : c === 2 ? -1 : 0;
                        if (c === 3) dx = pIdx === 0 ? -1 : 1;
                        let prev = pIdx;
                        for (let j = 0; j < len; j++) {
                            let nid = nodes.length;
                            nodes.push({
                                id: nid,
                                bonds: [prev],
                                x: nodes[pIdx].x + dx * (j + 1),
                                y: nodes[pIdx].y + dy * (j + 1),
                                bondOrders: { [prev]: 1 },
                            });
                            nodes[prev].bonds.push(nid);
                            nodes[prev].bondOrders[nid] = 1;
                            prev = nid;
                        }
                    });
                    const findL = (curr, v) => {
                        v.add(curr);
                        let path = [curr];
                        for (let nbr of nodes[curr].bonds) {
                            if (!v.has(nbr)) {
                                let sp = findL(nbr, new Set(v));
                                if (sp.length + 1 > path.length) path = [curr, ...sp];
                            }
                        }
                        return path;
                    };
                    nodes.forEach((_, i) => {
                        if (nodes[i].bonds.length === 1) {

                        let pTotal = pei || 1;
                        for (let i = 0; i < pTotal; i++) {
                            let ang = (i * 2 * Math.PI) / pTotal - Math.PI / 2;
                            crds.push([Math.cos(ang) * 90, Math.sin(ang) * 90]);
                        }
                    }
                    let lIdx = 0,
                        evSisa = pst.ev;
                    atoms.forEach((at) => {
                        let loopJml = atoms.length === 1 ? at.c - 1 : at.s === pst.s ? 0 : at.c;
                        for (let i = 0; i < loopJml; i++) {
                            if (!crds[lIdx]) break;
                            let ord = 1;
                            if (at.s == "N" && pst.s == "N") ord = 3;
                            else if (["O", "S"].includes(at.s)) ord = 2;
                            let isK = evSisa < ord && !isL;
                            drawL(cx, cy, cx + crds[lIdx][0], cy + crds[lIdx][1], ord, isK);
                            drawA(cx + crds[lIdx][0], cy + crds[lIdx][1], at.s, "#27ae60", 22);
                            if (!isK) evSisa -= ord;
                            lIdx++;
                        }
                    });
                    drawA(cx, cy, pst.s, "#2c3e50", 30);
                }
                return {
                    rumus: rumusHanya,
                    nama:
                        rumusHanya === "CH4"
                            ? "Metana"
                            : namaF.replace(/OO/g, "O").replace(/IID/g, "ID").replace(/IGI/g, "I").trim(),
                    mr: totalMr,
                    visual: cvs,
                    _bonds: hitungIkatan(atoms),
                    _atoms: atoms,
                };
            };
const hitungIkatan = (sumber) => {

                const bc = {};
                const add = (key, n = 1) => {
                    bc[key] = (bc[key] || 0) + n;
                };
                const garis = (ord) => (ord === 1 ? "-" : ord === 2 ? "=" : "#");
                const kunci = (a, b, ord) => {
                    const [L, R] = a <= b ? [a, b] : [b, a];
                    return `${L}${garis(ord)}${R}`;
                };
                if (Array.isArray(sumber) && sumber.length > 0 && "bondOrders" in sumber[0]) {
                    sumber.forEach((node) => {
                        node.bonds.forEach((tid) => {
                            if (tid <= node.id) return;
                            const ord = node.bondOrders[tid] || 1;
                            add(`C${garis(ord)}C`);
                        });
                        const terpakai = Object.values(node.bondOrders).reduce((a, b) => a + b, 0);
                        const hSisa = Math.max(0, 4 - terpakai);
                        if (hSisa > 0) add("C-H", hSisa);
                    });
                    return bc;
                }
                if (Array.isArray(sumber) && sumber.length > 0 && "ev" in sumber[0]) {
                    if (sumber.length === 0) return bc;
                    let iPusat = sumber.findIndex((a) => a.s !== "H" && a.jenis !== "Gas Mulia" && a.jenis !== "Logam");
                    if (iPusat === -1) iPusat = sumber.findIndex((a) => a.s !== "H" && a.jenis !== "Gas Mulia");
                    if (iPusat === -1) iPusat = 0;
                    const pusat = sumber[iPusat];
                    const isLogam = pusat.jenis === "Logam";
                    sumber.forEach((at, i) => {
                        if (i === iPusat) return;
                        let ord = 1;
                        if (!isLogam) {
                            const p = pusat.s,
                                l = at.s;
                            if (l === "N" && p === "N") ord = 3;
                            else if (l === "O" && p === "O") ord = 2;
                            else if (l === "C" && p === "C") ord = 3;
//penentuan pusat senyawa nomlogam diatomik heteronuklear
                            else if (["O", "S"].includes(l) && !["H", "F", "Cl", "Br", "I"].includes(p)) ord = 2;
//Hidrogen dan Halogen bukan pusat
                        }
                        add(kunci(pusat.s, at.s, ord), at.c);
                    });
                    return bc;
                }
                if (sumber && typeof sumber === "object" && "n" in sumber) {
                    const { n, typeE = 1, posF = 1, branches = [], halo = null, haloCount = 1 } = sumber;
                    for (let i = 0; i < n - 1; i++) {
                        const ord = i + 1 === posF && typeE > 1 ? typeE : 1;
                        add(`C${garis(ord)}C`);
                    }
                    branches.forEach((b) => {
                        for (let j = 0; j < b.size; j++) add("C-C");
                    });
                    const totalC = n + branches.reduce((a, b) => a + b.size, 0);
                    const baseH = 2 * totalC + 2 - (typeE - 1) * 2;
                    const haloH = halo && halo !== "OH" ? haloCount : 0;
                    add("C-H", Math.max(0, baseH - haloH));
                    if (halo === "OH") {
/*OH sebenarnya bukan Halo
sebenarnya untuk imbuhan di senyawa organik  saja */
                        add("C-O");
                        add("H-O");
                    } else if (halo === "F") add("C-F", haloCount);
                    else if (halo === "CL") add("C-Cl", haloCount);
                    else if (halo === "BR") add("C-Br", haloCount);
                    else if (halo === "I") add("C-I", haloCount);
                    return bc;
                }
            };
            if (skip) return prosesan2(input);
            return prosesBesar(input);
        }
    </script>
